<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="800" height="600" fill="#0d0d0d"/>
  <!-- mirror 1: gold accents, quote centre, bus panel -->
  <rect x="90" y="80" width="270" height="420" rx="14" fill="#151515" stroke="#2c2c2c" stroke-width="3"/>
  <rect x="101" y="91" width="248" height="398" rx="8" fill="#0a0a0c"/>
  <text x="126" y="164" font-size="40" font-weight="700" fill="#f5f5f5">06:15</text>
  <text x="128" y="186" font-size="12" font-weight="600" fill="#e9c98a">Måndag 6 juli</text>
  <text x="128" y="206" font-size="11" fill="#8a8a8a">God morgon, Sara</text>
  <text x="324" y="156" font-size="24" font-weight="700" fill="#e9c98a" text-anchor="end">14°</text>
  <text x="225" y="310" font-size="12" fill="#7a7a7a" text-anchor="middle" font-style="italic">”Ny vecka, nya mål.”</text>
  <text x="126" y="440" font-size="9" font-weight="600" fill="#e9c98a" letter-spacing="1.5">BUSS · CENTRALEN</text>
  <text x="126" y="458" font-size="10" fill="#a5a5a5">16 · 2 min &#160; 60 · 5 min</text>
  <!-- mirror 2: mint accents, stock centre, elpris panel -->
  <rect x="440" y="80" width="270" height="420" rx="14" fill="#151515" stroke="#2c2c2c" stroke-width="3"/>
  <rect x="451" y="91" width="248" height="398" rx="8" fill="#0a0a0c"/>
  <text x="476" y="164" font-size="40" font-weight="700" fill="#f5f5f5">6:15</text>
  <text x="478" y="186" font-size="12" font-weight="600" fill="#5fe3a1">Monday, July 6</text>
  <text x="478" y="206" font-size="11" fill="#8a8a8a">Good morning, Alex</text>
  <text x="674" y="156" font-size="24" font-weight="700" fill="#5fe3a1" text-anchor="end">57°</text>
  <!-- stock chart -->
  <text x="476" y="286" font-size="10" font-weight="600" fill="#5fe3a1" letter-spacing="1.5">AAPL · MONTH</text>
  <polyline points="476,340 500,332 524,336 548,320 572,326 596,308 620,312 644,296 668,300" fill="none" stroke="#5fe3a1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="476" y1="348" x2="668" y2="348" stroke="#222" stroke-width="1"/>
  <text x="476" y="440" font-size="9" font-weight="600" fill="#5fe3a1" letter-spacing="1.5">ELECTRICITY SE3</text>
  <text x="476" y="458" font-size="10" fill="#a5a5a5">Now 42 öre/kWh</text>
  <!-- swatch row underneath -->
  <g transform="translate(280,540)">
    <circle cx="0" cy="0" r="10" fill="#e9c98a"/>
    <circle cx="40" cy="0" r="10" fill="#ffdd00"/>
    <circle cx="80" cy="0" r="10" fill="#7fd3ff"/>
    <circle cx="120" cy="0" r="10" fill="#5fe3a1"/>
    <circle cx="160" cy="0" r="10" fill="#ff8aa8"/>
    <circle cx="200" cy="0" r="10" fill="#ffffff"/>
    <circle cx="40" cy="0" r="14" fill="none" stroke="#ffdd00" stroke-width="2"/>
