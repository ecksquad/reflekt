<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="800" height="600" fill="#0d0d0d"/>
  <!-- corner of frame, extreme close-up, angled -->
  <g transform="rotate(-8 400 300)">
    <!-- frame edge -->
    <rect x="60" y="120" width="760" height="70" fill="#1a1a1a"/>
    <rect x="60" y="186" width="760" height="8" fill="#242424"/>
    <!-- glass layers -->
    <rect x="60" y="194" width="760" height="16" fill="#31363b"/>
    <rect x="60" y="210" width="760" height="7" fill="#4a5158"/>
    <rect x="60" y="217" width="760" height="5" fill="#20242a"/>
    <!-- mirror surface below -->
    <rect x="60" y="222" width="760" height="330" fill="url(#surf)"/>
    <defs>
      <linearGradient id="surf" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#15171a"/>
        <stop offset="1" stop-color="#08090a"/>
      </linearGradient>
      <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#fff" stop-opacity="0"/>
        <stop offset=".5" stop-color="#fff" stop-opacity=".10"/>
        <stop offset="1" stop-color="#fff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- light streak on the glass -->
    <rect x="180" y="222" width="280" height="330" fill="url(#streak)"/>
    <!-- faint UI shining through the surface -->
    <text x="150" y="360" font-size="46" font-weight="700" fill="#e8e8e8" opacity=".9">07:4</text>
    <text x="154" y="392" font-size="14" font-weight="600" fill="#ffdd00" opacity=".85">Fredag 4 j</text>
  </g>
  <text x="788" y="588" font-size="11" fill="#333" text-anchor="end">sample visual — replace with photo</text>
</svg>
